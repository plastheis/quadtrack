# QuadTrack runtime configuration
# Current setup: Windows PC + NVIDIA GPU + Logitech C920 USB webcam
# Future setup:  Linux SBC + NPU + CSI camera module

camera:
  backend: usb          # usb | csi
  index: 0              # USB only — VideoCapture device index
  width: 640
  height: 480
  fps: 30
  autofocus: true        # true = camera-controlled autofocus | false = manual (set focus below)
  # focus: 0            # Manual focus value (0–255). Only used when autofocus: false.
  # GStreamer pipeline for future CSI support.
  # Uncomment and set backend: csi when migrating to the SBC.
  # gstreamer_pipeline: "nvarguscamerasrc ! video/x-raw(memory:NVMM),width=1280,height=720,framerate=30/1 ! nvvidconv ! video/x-raw,format=BGRx ! videoconvert ! video/x-raw,format=BGR ! appsink drop=1"

tracker:
  algorithms:
    - algorithm: mosse
    - algorithm: nanotrack
      async: true
      async_submit_strategy: "on_completion"   # "on_completion" | "fixed_interval"
      async_min_interval: 1                    # used only with fixed_interval
  fusion: iou              # iou | ioukf
  async_corr_thresh1: 0.7
  async_corr_thresh2: 0.3
  # nanotrack: ONNX Runtime (CUDA/CPU)
  nanotrack_backbone: models/nanotrackv3/nanotrackv3_backbone.onnx
  nanotrack_head:     models/nanotrackv3/nanotrackv3_head.onnx
  # nanotrack: RKNN (NPU) — convert from ONNX externally via rknn-toolkit2
  nanotrack_backbone_rknn: models/nanotrackv3/nanotrackv3_backbone.rknn
  nanotrack_head_rknn:     models/nanotrackv3/nanotrackv3_head.rknn

# IoU dead-reckoning fusion settings
fusion_velocity_ema_alpha: 0.3    # EMA smoothing for fast-tracker velocity

# Kalman filter fusion settings (used when fusion: ioukf)
kf_process_noise:   0.01   # Q — target acceleration uncertainty
kf_fast_meas_noise: 5.0    # R_fast — fast tracker centroid noise (pixels²)
kf_slow_meas_noise: 1.0    # R_slow — slow tracker centroid noise (pixels²)
kf_age_noise_scale: 0.5    # inflates R_slow per frame of staleness

inference:
  device: cuda          # cuda | npu | cpu
  # cuda → onnxruntime-gpu on Windows/NVIDIA
  # npu  → rknnlite (on Rockchip SBC) or rknn-toolkit2 simulation (PC); falls back to CPU
  # cpu  → universal fallback

serial:
  port: COM3            # Windows: COMx  |  Linux SBC: /dev/ttyUSB0 or /dev/ttyAMA0
  baud_rate: 115200

benchmark:
  dataset: anti-uav
  dataset_root: benchmark/datasets/anti-uav
  split: test                    # train | val | test
  modality: RGB                   # IR | RGB
  output_dir: benchmark_results
  visualize: false               # true = show live playback window during benchmark
  visualize_width: 640           # playback window width in pixels
  visualize_height: 480          # playback window height in pixels
  # Key bindings: n / Space = skip to next sequence   q / Esc = quit benchmark
